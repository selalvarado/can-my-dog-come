<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can My Dog Come? 🐕</title>
    <!-- Google Places JavaScript API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDBkeNURxsoBt1399VgDW9FIU-dB7w1DOw&libraries=places" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f3e8ff 50%, #fce7f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 60px 40px;
            text-align: center;
        }

        .emoji-large {
            font-size: 100px;
            margin-bottom: 20px;
        }

        .emoji-secondary {
            font-size: 80px;
            margin-top: 20px;
        }

        h1 {
            font-size: 48px;
            color: #1f2937;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 24px;
            color: #374151;
            margin-bottom: 24px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #9ca3af;
            font-size: 14px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }

        input, select {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            border: 2px solid #d1d5db;
            border-radius: 12px;
            margin-bottom: 24px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #a855f7;
        }

        input:disabled, select:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 18px 32px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .restaurant-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: left;
            transition: all 0.3s;
        }

        .restaurant-card:hover {
            border-color: #a855f7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
        }

        .restaurant-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .restaurant-name {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            flex: 1;
        }

        .restaurant-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 600;
            color: #f59e0b;
            margin-left: 12px;
        }

        .restaurant-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .meta-badge {
            background: #e0e7ff;
            color: #4338ca;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .meta-badge.price {
            background: #dcfce7;
            color: #15803d;
        }

        .restaurant-address {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .restaurant-license {
            font-size: 13px;
            color: #15803d;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .restaurant-actions {
            display: flex;
            gap: 8px;
        }

        .maps-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .maps-link:hover {
            background: #2563eb;
        }

        .loading-badge {
            background: #f3f4f6;
            color: #9ca3af;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-style: italic;
        }

        .restaurants-list {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 24px;
            padding-right: 8px;
        }

        .restaurants-list::-webkit-scrollbar {
            width: 8px;
        }

        .restaurants-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .restaurants-list::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }

        .result-box {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 16px;
            padding: 24px;
            margin: 24px 0;
        }

        .result-box.no {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .result-address {
            color: #6b7280;
            margin-bottom: 12px;
        }

        .result-status {
            font-size: 14px;
            color: #15803d;
        }

        .result-status.expired {
            color: #b91c1c;
        }

        .yes-title {
            font-size: 56px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 16px;
        }

        .no-title {
            font-size: 56px;
            font-weight: 700;
            color: #dc2626;
            margin-bottom: 16px;
        }

        .result-message {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 24px;
        }

        .footer {
            margin-top: 32px;
            font-size: 14px;
            color: #9ca3af;
        }

        .footer-hint {
            font-size: 12px;
            margin-top: 4px;
        }

        .animate-bounce {
            animation: bounce 1s infinite;
        }

        .animate-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        .browse-count {
            text-align: center;
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .back-button {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Form -->
        <div id="formView" class="card">
            <div class="emoji-large">🐕</div>
            <h1>Can My Dog Come?</h1>
            <p class="subtitle">Check if NYC restaurants have dog-friendly outdoor seating!</p>
            
            <!-- Search by Name -->
            <div>
                <label for="restaurant">Search by Restaurant Name</label>
                <input 
                    type="text" 
                    id="restaurant" 
                    placeholder="e.g., Joe's Pizza, The Smith, etc."
                    autocomplete="off"
                >
                
                <button id="searchBtn" onclick="searchRestaurant()">
                    <span id="searchText">🔍 Search</span>
                    <span id="loadingText" class="hidden"><span class="spinner"></span>Searching...</span>
                </button>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Browse by Borough -->
            <div>
                <label for="borough">Browse Restaurants by Borough</label>
                <select id="borough">
                    <option value="">Select a borough...</option>
                    <option value="Manhattan">Manhattan</option>
                    <option value="Brooklyn">Brooklyn</option>
                    <option value="Queens">Queens</option>
                    <option value="Bronx">Bronx</option>
                    <option value="Staten Island">Staten Island</option>
                </select>
                
                <button id="browseBtn" onclick="browseByBorough()" disabled>
                    <span id="browseText">🗺️ Browse Restaurants</span>
                    <span id="browseLoadingText" class="hidden"><span class="spinner"></span>Loading...</span>
                </button>
            </div>

            <div class="footer">
                Checking NYC sidewalk cafe permits database
                <div class="footer-hint">Enhanced with Google Places ratings & info</div>
            </div>
        </div>

        <!-- Browse Results View -->
        <div id="browseView" class="card hidden">
            <div class="emoji-large">🐕</div>
            <h2 id="boroughTitle"></h2>
            <p class="browse-count" id="restaurantCount"></p>
            
            <div class="restaurants-list" id="restaurantsList"></div>

            <button class="back-button" onclick="resetForm()">← Back to Search</button>
        </div>

        <!-- YES Result -->
        <div id="yesView" class="card hidden">
            <div class="animate-bounce">
                <div class="emoji-large">🐕</div>
                <div class="emoji-secondary">🎉</div>
            </div>
            
            <h2 class="yes-title">YES!</h2>
            <p class="result-message">Your dog can come!</p>
            
            <div class="result-box">
                <p class="result-title" id="yesRestaurantName"></p>
                <p class="result-address" id="yesAddress"></p>
                <p class="result-status" id="yesStatus"></p>
            </div>

            <button onclick="resetForm()">Check Another Restaurant</button>
        </div>

        <!-- NO Result -->
        <div id="noView" class="card hidden">
            <div>
                <div class="emoji-large animate-pulse">🐕</div>
                <div class="emoji-secondary">😢</div>
            </div>
            
            <h2 class="no-title">NO!</h2>
            <p class="result-message">Your dog cannot come</p>
            
            <div class="result-box no">
                <p id="noMessage"></p>
            </div>

            <button onclick="resetForm()">Check Another Restaurant</button>
        </div>

        <!-- Error View -->
        <div id="errorView" class="card hidden">
            <div class="emoji-large">⚠️</div>
            <h2 style="font-size: 32px; color: #1f2937; margin-bottom: 16px;">Oops!</h2>
            <p style="color: #6b7280; margin-bottom: 32px;" id="errorMessage"></p>
            <button onclick="resetForm()">Try Again</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('restaurant');
        const searchBtn = document.getElementById('searchBtn');
        const boroughSelect = document.getElementById('borough');
        const browseBtn = document.getElementById('browseBtn');
        
        let allRestaurants = [];
        let placesCache = {}; // Cache Google Places results

        // Enable search on Enter key
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRestaurant();
            }
        });

        // Enable/disable search button based on input
        input.addEventListener('input', function() {
            searchBtn.disabled = !input.value.trim();
        });

        // Enable/disable browse button based on borough selection
        boroughSelect.addEventListener('change', function() {
            console.log('Borough selected:', boroughSelect.value);
            console.log('Browse button before:', browseBtn.disabled);
            browseBtn.disabled = !boroughSelect.value;
            console.log('Browse button after:', browseBtn.disabled);
        });

        async function searchRestaurant() {
            const restaurantName = input.value.trim();
            
            if (!restaurantName) {
                return;
            }

            // Show loading state
            searchBtn.disabled = true;
            document.getElementById('searchText').classList.add('hidden');
            document.getElementById('loadingText').classList.remove('hidden');

            try {
                const data = await fetchRestaurantData();

                // Search for matching restaurant (case-insensitive)
                const searchTerm = restaurantName.toLowerCase();
                const match = data.find(item => 
                    item.assumed_name_s && 
                    item.assumed_name_s.toLowerCase().includes(searchTerm)
                );

                if (match) {
                    // Check if license is valid
                    const expirationDate = new Date(match.license_expiration_date);
                    const today = new Date();
                    const isValid = expirationDate > today;

                    if (isValid) {
                        showYesResult(match, expirationDate);
                    } else {
                        showNoResult(match, expirationDate, true);
                    }
                } else {
                    showNoResult(null, null, false);
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Could not connect to the NYC database. Please check your internet connection and try again.');
            } finally {
                // Reset button state
                searchBtn.disabled = false;
                document.getElementById('searchText').classList.remove('hidden');
                document.getElementById('loadingText').classList.add('hidden');
            }
        }

        async function browseByBorough() {
            const selectedBorough = boroughSelect.value;
            
            if (!selectedBorough) {
                return;
            }

            // Show loading state
            browseBtn.disabled = true;
            document.getElementById('browseText').classList.add('hidden');
            document.getElementById('browseLoadingText').classList.remove('hidden');

            try {
                const data = await fetchRestaurantData();
                const today = new Date();

                // Filter by borough and valid license
                let validRestaurants = data.filter(item => {
                    const hasValidLicense = item.license_expiration_date && 
                                           new Date(item.license_expiration_date) > today;
                    const isInBorough = item.borough && 
                                       item.borough.toLowerCase() === selectedBorough.toLowerCase();
                    return hasValidLicense && isInBorough && item.assumed_name_s;
                });

                // Shuffle the array for randomization
                validRestaurants = shuffleArray(validRestaurants);

                if (validRestaurants.length > 0) {
                    showBrowseResults(selectedBorough, validRestaurants);
                } else {
                    showError(`No restaurants with valid outdoor dining licenses found in ${selectedBorough}.`);
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Could not connect to the NYC database. Please check your internet connection and try again.');
            } finally {
                // Reset button state
                browseBtn.disabled = false;
                document.getElementById('browseText').classList.remove('hidden');
                document.getElementById('browseLoadingText').classList.add('hidden');
            }
        }

        async function fetchRestaurantData() {
            // Return cached data if available
            if (allRestaurants.length > 0) {
                return allRestaurants;
            }

            const response = await fetch(
                'https://data.cityofnewyork.us/resource/fpeh-f7ci.json?$limit=5000'
            );

            if (!response.ok) {
                throw new Error('Failed to fetch data from NYC Open Data');
            }

            allRestaurants = await response.json();
            return allRestaurants;
        }

        async function getGooglePlacesInfo(restaurantName, address) {
            // Check cache first
            const cacheKey = `${restaurantName}_${address}`;
            if (placesCache[cacheKey]) {
                return placesCache[cacheKey];
            }
 
            // Wait for Google Maps to load
            if (!window.google || !window.google.maps) {
                console.warn('Google Maps not loaded yet');
                return null;
            }
 
            try {
                return new Promise((resolve) => {
                    // Create a temporary div for the service
                    const service = new google.maps.places.PlacesService(document.createElement('div'));
                    
                    const request = {
                        query: `${restaurantName} ${address} New York`,
                        fields: ['name', 'rating', 'user_ratings_total', 'price_level', 'types', 'url', 'place_id']
                    };
 
                    // Use textSearch instead of findPlaceFromQuery
                    service.textSearch(request, (results, status) => {
                        if (status === google.maps.places.PlacesServiceStatus.OK && results && results.length > 0) {
                            const place = results[0];
                            const result = {
                                rating: place.rating,
                                ratingsCount: place.user_ratings_total,
                                priceLevel: place.price_level,
                                types: place.types,
                                mapsUrl: place.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(restaurantName + ' ' + address)}`
                            };
                            
                            // Cache the result
                            placesCache[cacheKey] = result;
                            resolve(result);
                        } else {
                            console.log('Places search status:', status);
                            resolve(null);
                        }
                    });
                });
            } catch (error) {
                console.error('Error fetching Google Places data:', error);
                return null;
            }
        }

        function getPriceLevelDisplay(priceLevel) {
            if (!priceLevel) return null;
            return '$'.repeat(priceLevel);
        }

        function getCuisineType(types) {
            if (!types) return null;
            
            const cuisineTypes = {
                'italian_restaurant': 'Italian',
                'chinese_restaurant': 'Chinese',
                'japanese_restaurant': 'Japanese',
                'mexican_restaurant': 'Mexican',
                'french_restaurant': 'French',
                'indian_restaurant': 'Indian',
                'thai_restaurant': 'Thai',
                'pizza_restaurant': 'Pizza',
                'seafood_restaurant': 'Seafood',
                'steakhouse': 'Steakhouse',
                'american_restaurant': 'American',
                'cafe': 'Cafe',
                'bar': 'Bar',
                'bakery': 'Bakery'
            };

            for (let type of types) {
                if (cuisineTypes[type]) {
                    return cuisineTypes[type];
                }
            }

            return 'Restaurant';
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function showBrowseResults(borough, restaurants) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('browseView').classList.remove('hidden');
            
            document.getElementById('boroughTitle').textContent = `Dog-Friendly Restaurants in ${borough}`;
            document.getElementById('restaurantCount').textContent = 
                `${restaurants.length} restaurants with valid outdoor dining licenses`;

            const listContainer = document.getElementById('restaurantsList');
            listContainer.innerHTML = '';

            // Show restaurants immediately, then enhance with Google data
            restaurants.forEach(async (restaurant, index) => {
                const card = document.createElement('div');
                card.className = 'restaurant-card';
                card.id = `restaurant-${index}`;
                
                const expirationDate = new Date(restaurant.license_expiration_date);
                
                // Initial card without Google data
                card.innerHTML = `
                    <div class="restaurant-header">
                        <div class="restaurant-name">${restaurant.assumed_name_s}</div>
                        <div class="restaurant-rating-placeholder"></div>
                    </div>
                    <div class="restaurant-meta">
                        <span class="loading-badge">Loading info...</span>
                    </div>
                    <div class="restaurant-address">${restaurant.street || 'Address not available'}</div>
                    <div class="restaurant-license">✓ Valid license (expires: ${expirationDate.toLocaleDateString()})</div>
                    <div class="restaurant-actions"></div>
                `;
                
                listContainer.appendChild(card);

                // Fetch Google Places data asynchronously
                const placesInfo = await getGooglePlacesInfo(restaurant.assumed_name_s, restaurant.street);
                
                // Update card with Google data
                if (placesInfo) {
                    const ratingPlaceholder = card.querySelector('.restaurant-rating-placeholder');
                    if (placesInfo.rating) {
                        ratingPlaceholder.innerHTML = `
                            <div class="restaurant-rating">
                                ⭐ ${placesInfo.rating}
                                ${placesInfo.ratingsCount ? `<span style="color: #9ca3af; font-size: 14px;">(${placesInfo.ratingsCount})</span>` : ''}
                            </div>
                        `;
                    }

                    const metaContainer = card.querySelector('.restaurant-meta');
                    let metaHTML = '';
                    
                    const cuisine = getCuisineType(placesInfo.types);
                    if (cuisine) {
                        metaHTML += `<span class="meta-badge">${cuisine}</span>`;
                    }
                    
                    const priceLevel = getPriceLevelDisplay(placesInfo.priceLevel);
                    if (priceLevel) {
                        metaHTML += `<span class="meta-badge price">${priceLevel}</span>`;
                    }

                    metaContainer.innerHTML = metaHTML || '<span class="loading-badge">Info not available</span>';

                    if (placesInfo.mapsUrl) {
                        const actionsContainer = card.querySelector('.restaurant-actions');
                        actionsContainer.innerHTML = `
                            <a href="${placesInfo.mapsUrl}" target="_blank" class="maps-link">
                                📍 View on Google Maps
                            </a>
                        `;
                    }
                } else {
                    const metaContainer = card.querySelector('.restaurant-meta');
                    metaContainer.innerHTML = '<span class="loading-badge">Info not available</span>';
                }
            });
        }

        function showYesResult(restaurant, expirationDate) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('yesView').classList.remove('hidden');
            
            document.getElementById('yesRestaurantName').textContent = restaurant.assumed_name_s;
            document.getElementById('yesAddress').textContent = restaurant.street || 'Address not available';
            document.getElementById('yesStatus').textContent = 
                `✓ Valid sidewalk cafe permit (expires: ${expirationDate.toLocaleDateString()})`;
        }

        function showNoResult(restaurant, expirationDate, expired) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('noView').classList.remove('hidden');
            
            const noMessage = document.getElementById('noMessage');
            
            if (expired) {
                noMessage.innerHTML = `
                    <p class="result-title">${restaurant.assumed_name_s}</p>
                    <p class="result-address">${restaurant.street || 'Address not available'}</p>
                    <p class="result-status expired">✗ Sidewalk cafe permit expired on ${expirationDate.toLocaleDateString()}</p>
                `;
            } else {
                noMessage.innerHTML = `
                    <p style="color: #374151;">We couldn't find "${input.value}" in NYC's sidewalk cafe permit database. 
                    They may not have outdoor seating or the name might be different.</p>
                `;
            }
        }

        function showError(message) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('errorView').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function resetForm() {
            // Hide all result views
            document.getElementById('yesView').classList.add('hidden');
            document.getElementById('noView').classList.add('hidden');
            document.getElementById('errorView').classList.add('hidden');
            document.getElementById('browseView').classList.add('hidden');
            
            // Show form
            document.getElementById('formView').classList.remove('hidden');
            
            // Clear inputs
            input.value = '';
            boroughSelect.value = '';
            searchBtn.disabled = true;
            browseBtn.disabled = true;
        }

        // Initialize button states
        searchBtn.disabled = true;
        browseBtn.disabled = true;
    </script>
</body>
</html>
